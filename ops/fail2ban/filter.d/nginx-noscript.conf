# fail2ban filter: catches IPs probing for non-existent sensitive paths.
#
# Works with the dedicated /var/log/nginx/bot-attacks.log populated by nginx
# when $bot_pattern=1 (see nginx/get2b-ratelimit.conf map). These requests are
# closed by nginx with return 444 before hitting the application, but the
# access_log line is still written (nginx logs at the end of request processing).
#
# Matches format: combined log format
# Example line:
#   1.2.3.4 - - [08/Apr/2026:12:34:56 +0300] "GET /.env HTTP/1.1" 444 0 "-" "-"

[Definition]

failregex = ^<HOST> .* "(GET|POST|HEAD|PUT|DELETE|OPTIONS) /.*" (444|403|404) .*$

ignoreregex =

# fail2ban uses datepattern auto-detection for combined log format by default.
