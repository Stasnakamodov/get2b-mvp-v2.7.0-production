name: Deploy GET2B

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: stasnakamodov/get2b-mvp-v2.7.0-production

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npx next lint

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test -- --ci --passWithNoTests

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: [build-and-push]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          IMAGE_LATEST: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GH_ACTOR,IMAGE_TAG,IMAGE_LATEST
          script: |
            set -e
            cd /var/www/godplis

            # Login to GHCR and pull new image
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker pull "$IMAGE_TAG"
            docker tag "$IMAGE_TAG" "$IMAGE_LATEST"

            # Update compose file, sql, and configs from repo
            git pull origin main

            # Ensure PostgreSQL is running and healthy
            docker compose up -d postgres
            echo "Waiting for PostgreSQL..."
            for i in $(seq 1 15); do
              if docker compose exec -T postgres pg_isready -U get2b 2>/dev/null; then
                echo "PostgreSQL is ready!"
                break
              fi
              if [ $i -eq 15 ]; then
                echo "PostgreSQL failed to start!"
                docker compose logs postgres --tail=20
                exit 1
              fi
              sleep 2
            done

            # Start application (depends on postgres)
            docker compose up -d

            # --- Sync nginx configs from repo to system (idempotent) ---
            # Repo is source of truth for nginx/get2b.conf and nginx/get2b-ratelimit.conf
            nginx_needs_reload=0
            if ! cmp -s /var/www/godplis/nginx/get2b.conf /etc/nginx/sites-enabled/get2b 2>/dev/null; then
              cp /var/www/godplis/nginx/get2b.conf /etc/nginx/sites-enabled/get2b
              nginx_needs_reload=1
              echo "nginx: get2b.conf updated"
            fi
            if ! cmp -s /var/www/godplis/nginx/get2b-ratelimit.conf /etc/nginx/conf.d/get2b-ratelimit.conf 2>/dev/null; then
              cp /var/www/godplis/nginx/get2b-ratelimit.conf /etc/nginx/conf.d/get2b-ratelimit.conf
              nginx_needs_reload=1
              echo "nginx: get2b-ratelimit.conf updated"
            fi
            if [ "$nginx_needs_reload" = "1" ]; then
              if nginx -t; then
                # Ensure bot-attacks log file exists (fail2ban reads it)
                touch /var/log/nginx/bot-attacks.log
                chown www-data:adm /var/log/nginx/bot-attacks.log 2>/dev/null || true
                nginx -s reload
                echo "nginx: config valid, reloaded"
              else
                echo "nginx: config test FAILED — reverting to previous version"
                cd /var/www/godplis && git checkout HEAD~1 -- nginx/
                cp /var/www/godplis/nginx/get2b.conf /etc/nginx/sites-enabled/get2b
                cp /var/www/godplis/nginx/get2b-ratelimit.conf /etc/nginx/conf.d/get2b-ratelimit.conf
                nginx -t && nginx -s reload
                exit 1
              fi
            fi

            # Wait for health check
            echo "Waiting for application to start..."
            for i in $(seq 1 12); do
              if docker compose exec -T web node -e "fetch('http://localhost:3000/api/health').then(r=>{if(r.ok){console.log('healthy');process.exit(0)}else{process.exit(1)}}).catch(()=>process.exit(1))" 2>/dev/null; then
                echo "Application is healthy!"
                exit 0
              fi
              if [ $i -eq 12 ]; then
                echo "Health check failed after 120s!"
                docker compose logs --tail=50
                exit 1
              fi
              echo "Waiting... ($i/12)"
              sleep 10
            done

            # Cleanup old images
            docker image prune -f

  rollback:
    name: Rollback (manual)
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/godplis

            # Get previous image SHA from docker history
            CURRENT=$(docker inspect get2b-app --format='{{.Config.Image}}' 2>/dev/null || echo "none")
            echo "Current image: $CURRENT"

            # List available tags
            echo "Available images:"
            docker images "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" --format "{{.Tag}} {{.CreatedAt}}" | head -5

            echo "To rollback manually:"
            echo "  docker compose pull ghcr.io/REPO:PREVIOUS_SHA"
            echo "  docker compose up -d"
