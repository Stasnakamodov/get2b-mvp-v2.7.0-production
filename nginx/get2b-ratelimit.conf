# ===========================================
# GET2B Rate Limiting Zones
# Place in /etc/nginx/conf.d/ (loaded in http{} context)
# ===========================================

# General API rate limit: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;

# Webhook endpoints: 30 requests/second per IP (Telegram sends bursts)
limit_req_zone $binary_remote_addr zone=api_webhook:10m rate=30r/s;

# Connection limit per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Return 429 instead of 503 when rate limited
limit_req_status 429;
limit_conn_status 429;
