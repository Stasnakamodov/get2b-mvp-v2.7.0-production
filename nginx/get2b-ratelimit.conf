# ===========================================
# GET2B Rate Limiting Zones & Log Filtering
# Place in /etc/nginx/conf.d/ (loaded in http{} context)
# ===========================================

# --- Rate limit zones ---
# General API rate limit: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;

# Webhook endpoints: 30 requests/second per IP (Telegram sends bursts)
limit_req_zone $binary_remote_addr zone=api_webhook:10m rate=30r/s;

# Web root (pages + Server Actions): 20 req/s per IP
# Normal browser does ~10-15 req/s when loading a page, scanners exceed this
limit_req_zone $binary_remote_addr zone=web_root:10m rate=20r/s;

# Connection limit per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Return 429 instead of 503 when rate limited
limit_req_status 429;
limit_conn_status 429;

# --- Log filtering maps ---
# $loggable=1 → write to main access log; $loggable=0 → skip (reduces log noise & injection surface)
map $request_uri $loggable {
    default                                  1;
    ~*^/cgi-bin/                             0;
    ~*(\.%2e|%%32%65)                        0;
    ~*^/wp-(admin|login|content|includes)    0;
    ~*^/\.env                                0;
    ~*^/\.git/                               0;
    ~*^/(phpmyadmin|phpMyAdmin|pma)          0;
    ~*^/boaform/                             0;
    ~*^/HNAP1                                0;
    ~*^/manager/html                         0;
}

# $bot_pattern=1 → write to bot-attacks log (fail2ban watches this), 0 → don't write
map $request_uri $bot_pattern {
    default                                  0;
    ~*^/cgi-bin/                             1;
    ~*(\.%2e|%%32%65)                        1;
    ~*^/wp-(admin|login|content|includes)    1;
    ~*^/\.env                                1;
    ~*^/\.git/                               1;
    ~*^/(phpmyadmin|phpMyAdmin|pma)          1;
    ~*^/boaform/                             1;
    ~*^/HNAP1                                1;
    ~*^/manager/html                         1;
}
