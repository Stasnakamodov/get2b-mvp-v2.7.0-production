# ===========================================
# GET2B Nginx — reverse proxy + SSL + security
# Domain: get2b.pro
# Backend: Docker container on port 3000
# ===========================================

# Rate limiting zones (require http context — include from /etc/nginx/conf.d/get2b-ratelimit.conf)
# If nginx supports include here, otherwise copy these to /etc/nginx/nginx.conf http{} block:
#   limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
#   limit_req_zone $binary_remote_addr zone=api_webhook:10m rate=30r/s;
#   limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name get2b.pro www.get2b.pro;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://get2b.pro$request_uri;
    }
}

# Redirect www → non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.get2b.pro;

    ssl_certificate /etc/letsencrypt/live/get2b.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/get2b.pro/privkey.pem;

    return 301 https://get2b.pro$request_uri;
}

# Main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name get2b.pro;

    # --- CVE-2025-29927 mitigation (defense in depth) ---
    # Next.js 15.2.3+ already fixes this, but if version is ever downgraded
    # or a similar class of bug reappears, this keeps us protected.
    if ($http_x_middleware_subrequest) {
        return 403;
    }

    # --- Block known bot/scanner URL patterns ---
    # 444 = close connection without response (nginx-specific).
    # These show up in access.log with POST/GET on paths we never expose.
    # Paths are taken from observed attacks (see /var/log/nginx/access.log history).
    if ($request_uri ~* "(\.%2e|%%32%65)") { return 444; }
    if ($request_uri ~* "^/cgi-bin/") { return 444; }
    if ($request_uri ~* "^/wp-(admin|login|content|includes)") { return 444; }
    if ($request_uri ~* "^/(phpmyadmin|phpMyAdmin|pma)") { return 444; }
    if ($request_uri ~* "^/boaform/") { return 444; }
    if ($request_uri ~* "^/HNAP1") { return 444; }
    if ($request_uri ~* "^/manager/html") { return 444; }
    if ($request_uri ~* "^/\.env") { return 444; }
    if ($request_uri ~* "^/\.git/") { return 444; }

    # --- SSL ---
    ssl_certificate /etc/letsencrypt/live/get2b.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/get2b.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- Security Headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Connection Limit ---
    limit_conn conn_limit 20;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # --- Deny access to dotfiles ---
    location ~ /\. {
        deny all;
        return 404;
    }

    # --- Product images from Docker volume (bypass Next.js standalone) ---
    location /images/products/ {
        alias /var/lib/docker/volumes/godplis_product-images/_data/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # --- Next.js static assets (hashed filenames, cache forever) ---
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Telegram webhook endpoints (higher rate limit) ---
    location ~ ^/api/(telegram-webhook|telegram-chat-webhook|get2b-webhook) {
        limit_req zone=api_webhook burst=50 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Strip CVE-2025-29927 bypass header from any client request
        proxy_set_header x-middleware-subrequest "";
        proxy_read_timeout 30s;
        client_max_body_size 10m;
        add_header Cache-Control "no-store";
    }

    # --- API routes — rate limited, no cache, extended timeouts ---
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Strip CVE-2025-29927 bypass header from any client request
        proxy_set_header x-middleware-subrequest "";

        # Extended timeouts for heavy operations (parsing, OCR, AI)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        # File uploads
        client_max_body_size 50m;

        # No cache
        add_header Cache-Control "no-store";
    }

    # --- Everything else → Next.js ---
    location / {
        # Rate limit on web root (pages + Server Actions) — was previously unprotected
        limit_req zone=web_root burst=30 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Strip CVE-2025-29927 bypass header from any client request
        proxy_set_header x-middleware-subrequest "";

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        client_max_body_size 50m;
    }

    # --- Logs ---
    # Main log: skips bot/scanner noise (controlled by $loggable map in ratelimit.conf)
    access_log /var/log/nginx/get2b-access.log combined if=$loggable;
    # Bot attacks log: only bot/scanner URL patterns (fail2ban watches this)
    access_log /var/log/nginx/bot-attacks.log combined if=$bot_pattern;
    error_log /var/log/nginx/get2b-error.log warn;
}
